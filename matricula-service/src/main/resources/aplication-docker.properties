spring.application.name=matricula-service

server.port=8083

spring.datasource.url=jdbc:mysql://mysql-instituto:3306/instituto_matriculas_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

services.alumno.url=http://alumno-service:8081/api/alumnos
services.curso.url=http://curso-service:8082/api/cursos